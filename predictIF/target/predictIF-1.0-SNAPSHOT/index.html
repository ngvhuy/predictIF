<!DOCTYPE html>
<html>
    <head>
        <title>PredictIF</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: Georgia, serif;
                background-color: #0d0d1a;
                color: #e8d5b7;
            }

            /* HEADER */
            header {
                text-align: center;
                padding: 60px 20px 40px;
                background: linear-gradient(180deg, #1a0a2e 0%, #0d0d1a 100%);
                border-bottom: 1px solid #3a2a5e;
            }

            header h1 {
                font-size: 3.5rem;
                letter-spacing: 8px;
                color: #c9a84c;
                text-transform: uppercase;
            }

            header p {
                margin-top: 12px;
                font-size: 1.1rem;
                color: #a89070;
                font-style: italic;
            }

            /* SECTION MEDIUMS */
            .section-mediums {
                max-width: 800px;
                margin: 60px auto 0;
                padding: 0 20px;
                text-align: center;
            }

            .section-mediums h2 {
                font-size: 1.6rem;
                color: #c9a84c;
                margin-bottom: 30px;
                letter-spacing: 2px;
            }

            .liste-mediums-apercu {
                list-style: none;
                display: flex;
                flex-direction: column;
                gap: 12px;
                margin-bottom: 20px;
            }

            .liste-mediums-apercu li {
                font-size: 1.1rem;
                color: #e8d5b7;
                padding: 10px 0;
                border-bottom: 1px solid #2a1a4e;
            }

            .lien-voir-tous {
                display: inline-block;
                margin-top: 8px;
                font-size: 0.9rem;
                color: #a89070;
                text-decoration: underline;
                font-style: italic;
            }

            .lien-voir-tous:hover {
                color: #c9a84c;
            }

            /* SECTION CARTES */
            .section-cartes {
                max-width: 900px;
                margin: 60px auto 80px;
                padding: 0 20px;
                display: flex;
                gap: 30px;
            }

            .carte {
                flex: 1;
                border: 1px solid #3a2a5e;
                border-radius: 8px;
                padding: 40px 30px;
                text-align: center;
                background-color: #13102a;
            }

            .carte p {
                font-size: 1.05rem;
                color: #a89070;
                margin-bottom: 25px;
                line-height: 1.6;
            }

            .carte button {
                padding: 12px 28px;
                font-size: 0.95rem;
                font-family: Georgia, serif;
                background-color: #c9a84c;
                color: #0d0d1a;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                letter-spacing: 1px;
            }

            .carte button:hover {
                background-color: #e8c86a;
            }
        </style>
    </head>
    <body>

        <header>
            <h1>Predict'IF</h1>
            <p>Le site de médiums à consulter</p>
        </header>

        <section class="section-mediums">
            <h2>Notre liste de médiums</h2>
            <ul class="liste-mediums-apercu" id="apercu-mediums">
                <li>Chargement...</li>
            </ul>
            <a class="lien-voir-tous" href="mediums.html">Voir tous nos médiums</a>
        </section>

        <section class="section-cartes">
            <div class="carte">
                <p>Vous voulez profiter d'une prédiction ?</p>
                <button onclick="window.location.href='inscription.html'">Inscrivez-vous</button>
            </div>
            <div class="carte">
                <p>Vous êtes déjà inscrit ? Parfait.</p>
                <button onclick="window.location.href='connexion.html'">Connectez-vous</button>
            </div>
        </section>

        <script>
            async function chargerApercuMediums() {
                try {
                    const response = await fetch("/predictIF/ActionServlet?todo=consulter-liste-mediums");
                    const mediums = await response.json();
                    const ul = document.getElementById("apercu-mediums");
                    ul.innerHTML = "";
                    mediums.slice(0, 3).forEach(function(m) {
                        const li = document.createElement("li");
                        li.textContent = m.denomination + " — " + m.genre;
                        ul.appendChild(li);
                    });
                } catch (e) {
                    document.getElementById("apercu-mediums").innerHTML = "<li>Impossible de charger les médiums.</li>";
                }
            }
            window.onload = chargerApercuMediums;
        </script>

    </body>
</html>
