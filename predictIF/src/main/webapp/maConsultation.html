<!DOCTYPE html>
<html lang="fr">
<head>
    <title>Ma Consultation — Predict'IF</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <style>
        .consult-page {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        .consult-page h1 {
            text-align: center;
            color: #c9a84c;
            font-size: 1.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .btn-pill {
            display: block;
            margin: 0 auto 30px;
            padding: 14px 40px;
            background-color: #c9a84c;
            color: #0d0d1a;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn-pill:hover:not(:disabled) {
            background-color: #e0c060;
        }

        .btn-pill:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .consult-card {
            background-color: #13102a;
            border: 1px solid #3a2a5e;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .consult-card h2 {
            font-size: 0.85rem;
            color: #c9a84c;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 0 0 18px 0;
            font-weight: bold;
        }

        .type-badge {
            display: inline-block;
            background-color: #9b59b6;
            color: white;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 1px;
            margin-left: 8px;
            vertical-align: middle;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #2a1a4e;
            font-size: 0.95rem;
        }

        .info-row:last-child { border-bottom: none; }

        .info-label { color: #888; }

        .info-value {
            color: #e8d5b7;
            text-align: right;
            max-width: 60%;
        }

        .hist-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .hist-table thead tr {
            border-bottom: 1px solid #c9a84c;
        }

        .hist-table th {
            color: #c9a84c;
            text-align: left;
            padding: 6px 10px 10px;
            font-weight: normal;
            letter-spacing: 1px;
        }

        .hist-table td {
            color: #e8d5b7;
            padding: 10px;
            border-bottom: 1px solid #2a1a4e;
            vertical-align: top;
        }

        .hist-table td:first-child {
            white-space: nowrap;
            width: 130px;
        }

        .no-hist {
            color: #555;
            font-style: italic;
        }

        .slider-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 18px;
        }

        .slider-label {
            color: #e8d5b7;
            min-width: 60px;
            font-size: 0.95rem;
        }

        .slider-wrap { flex: 1; }

        .slider {
            width: 100%;
            -webkit-appearance: none;
            height: 6px;
            background: #2a1a4e;
            border-radius: 3px;
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #c9a84c;
            cursor: pointer;
        }

        .slider-ticks {
            display: flex;
            justify-content: space-between;
            padding: 0 2px;
            margin-top: 4px;
        }

        .slider-ticks span { color: #555; font-size: 0.7rem; }

        .btn-predire {
            background-color: #c9a84c;
            color: #0d0d1a;
            border: none;
            border-radius: 4px;
            padding: 8px 18px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 14px;
            letter-spacing: 1px;
            transition: background-color 0.3s;
        }

        .btn-predire:hover { background-color: #e0c060; }

        .prediction-textarea,
        .commentaire-textarea {
            width: 100%;
            min-height: 110px;
            background-color: #0d0d1a;
            border: 1px solid #3a2a5e;
            border-radius: 4px;
            color: #e8d5b7;
            font-family: Georgia, serif;
            font-size: 0.9rem;
            padding: 12px;
            resize: vertical;
            box-sizing: border-box;
        }

        .prediction-textarea::placeholder,
        .commentaire-textarea::placeholder { color: #444; }

        .no-consult {
            text-align: center;
            color: #555;
            font-style: italic;
            padding: 60px 0;
        }

        /* Section cachée jusqu'au clic "Je me sens prêt" */
        #section-travail { display: none; }
    </style>
</head>
<body>
    <nav>
        <a class="nav-logo" href="index.html">Predict'IF</a>
        <ul id="nav-liens"></ul>
    </nav>

    <div class="page-content">
        <div class="consult-page">
            <h1>Ma Consultation</h1>
            <div id="consultation-content">
                <div class="no-consult">Chargement...</div>
            </div>
        </div>
    </div>

    <script src="nav.js"></script>
    <script>
        let consultationData = null;

        window.onload = function () {
            chargerNav();
            chargerFooter();
            chargerConsultation();
        };

        function chargerConsultation() {
            fetch("/predictIF/ActionServlet?todo=charger-ma-consultation")
                .then(r => r.json())
                .then(data => {
                    consultationData = data;
                    afficherConsultation(data);
                })
                .catch(() => {
                    document.getElementById("consultation-content").innerHTML =
                        '<div class="no-consult">Erreur lors du chargement.</div>';
                });
        }

        function afficherConsultation(data) {
            if (!data.id || data.id === 0) {
                document.getElementById("consultation-content").innerHTML =
                    '<div class="no-consult">Aucune consultation en cours pour le moment.</div>';
                return;
            }

            const clientNom = ((data.clientPrenom || '') + ' ' + (data.clientNom || '')).trim();
            const mediumNom = data.mediumDenomination || '-';
            const estPret = data.estPret === true;

            const historiqueRows = data.historique && data.historique.length > 0
                ? data.historique.map(h => `
                    <tr>
                        <td>${h.date || '-'}</td>
                        <td>${h.commentaire || '-'}</td>
                    </tr>`).join('')
                : `<tr><td colspan="2" class="no-hist">Aucune consultation antérieure avec ce médium.</td></tr>`;

            document.getElementById("consultation-content").innerHTML = `

                <!-- Bouton Prêt -->
                <button class="btn-pill" id="btn-pret" onclick="demarrerConsultation()" ${estPret ? 'disabled' : ''}>
                    JE ME SENS PRÊTE
                </button>

                <!-- Medium -->
                <div class="consult-card">
                    <h2>Médium : <span class="type-badge">${data.mediumGenre || ''}</span></h2>
                    <div class="info-row">
                        <span class="info-label">Dénomination :</span>
                        <span class="info-value">${data.mediumDenomination || '-'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Genre :</span>
                        <span class="info-value">${data.mediumGenre || '-'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Présentation :</span>
                        <span class="info-value">${data.mediumPresentation || '-'}</span>
                    </div>
                </div>

                <!-- Profil Astral -->
                <div class="consult-card">
                    <h2>Profil Astral de ${clientNom}</h2>
                    <div class="info-row">
                        <span class="info-label">Zodiaque :</span>
                        <span class="info-value">🔵 ${data.profilZodiac || '-'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Chinois :</span>
                        <span class="info-value">🐲 ${data.profilSigneChinois || '-'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Couleur :</span>
                        <span class="info-value">${data.profilCouleur || '-'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Animal :</span>
                        <span class="info-value">${data.profilAnimal || '-'}</span>
                    </div>
                </div>

                <!-- Historique -->
                <div class="consult-card">
                    <h2>Historique des consultations de ${clientNom} avec ${mediumNom}</h2>
                    <table class="hist-table">
                        <thead><tr><th>Date</th><th>Commentaire</th></tr></thead>
                        <tbody>${historiqueRows}</tbody>
                    </table>
                </div>

                <!-- Section travail : cachée jusqu'au clic "Je me sens prêt" -->
                <div id="section-travail" style="display: ${estPret ? 'block' : 'none'}">

                    <!-- Outils d'Aide -->
                    <div class="consult-card">
                        <h2>Outils d'Aide</h2>
                        <div class="slider-row">
                            <span class="slider-label">Amour</span>
                            <div class="slider-wrap">
                                <input type="range" id="niveau-amour" class="slider" min="1" max="4" value="1">
                                <div class="slider-ticks"><span>1</span><span>2</span><span>3</span><span>4</span></div>
                            </div>
                        </div>
                        <div class="slider-row">
                            <span class="slider-label">Santé</span>
                            <div class="slider-wrap">
                                <input type="range" id="niveau-sante" class="slider" min="1" max="4" value="1">
                                <div class="slider-ticks"><span>1</span><span>2</span><span>3</span><span>4</span></div>
                            </div>
                        </div>
                        <div class="slider-row">
                            <span class="slider-label">Travail</span>
                            <div class="slider-wrap">
                                <input type="range" id="niveau-travail" class="slider" min="1" max="4" value="1">
                                <div class="slider-ticks"><span>1</span><span>2</span><span>3</span><span>4</span></div>
                            </div>
                        </div>
                        <button class="btn-predire" onclick="genererPrediction()">Prédire</button>
                        <textarea id="prediction-display" class="prediction-textarea" placeholder="Votre prédiction générée..."></textarea>
                    </div>

                    <!-- Commentaire Final -->
                    <div class="consult-card">
                        <h2>Commentaire Final de Consultation</h2>
                        <textarea id="commentaires" class="commentaire-textarea" placeholder="Saisissez vos notes ici...">${data.commentaire || ''}</textarea>
                    </div>

                    <!-- Bouton Fin -->
                    <button class="btn-pill" onclick="terminerConsultation()">
                        FIN DE CONSULTATION
                    </button>

                </div>
            `;
        }

        function demarrerConsultation() {
            fetch("/predictIF/ActionServlet?todo=demarrer-consultation", { method: 'POST' })
                .then(() => {
                    document.getElementById("btn-pret").disabled = true;
                    document.getElementById("section-travail").style.display = "block";
                })
                .catch(err => alert('Erreur : ' + err));
        }

        function genererPrediction() {
            const amour = document.getElementById('niveau-amour').value;
            const sante = document.getElementById('niveau-sante').value;
            const travail = document.getElementById('niveau-travail').value;

            document.getElementById('prediction-display').value = "Chargement des visions astro-psychiques...";

            fetch(`/predictIF/ActionServlet?todo=generer-prediction&amour=${amour}&sante=${sante}&travail=${travail}`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('prediction-display').value = data.prediction || "Énergie instable, veuillez réessayer.";
                })
                .catch(() => {
                    document.getElementById('prediction-display').value =
                        `Énergie perçue — Amour : ${amour}/4, Santé : ${sante}/4, Travail : ${travail}/4.`;
                });
        }

        function terminerConsultation() {
            const commentaire = document.getElementById('commentaires').value;
            const params = new URLSearchParams({
                todo: 'terminer-consultation',
                commentaire: commentaire
            });

            fetch("/predictIF/ActionServlet", {
                method: 'POST',
                body: params,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            })
                .then(() => chargerConsultation())
                .catch(err => alert('Erreur : ' + err));
        }
    </script>
</body>
</html>
