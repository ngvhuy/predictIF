<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte des Clients - Predict'IF</title>
    
    <!-- Inclusion CSS Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { margin: 0; font-size: 1.5em; }
        #nav-liens { list-style-type: none; padding: 0; margin: 0; display: flex; gap: 20px; }
        #nav-liens li a { color: white; text-decoration: none; font-weight: bold; }
        #nav-liens li a:hover { text-decoration: underline; }
        
        .container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* Style pour la carte Leaflet */
        #map {
            height: 70vh;
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border: 2px solid #ccc;
        }
    </style>
</head>
<body>
    <header>
        <h1>Predict'IF - Répartition Géographique</h1>
        <nav><ul id="nav-liens"></ul></nav>
    </header>
    
    <div class="container">
        <h2>Carte des clients recensés</h2>
        <div id="map"></div>
    </div>

    <!-- Inclusion JS Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Inclusion de votre JS global -->
    <script src="nav.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            await chargerNav();
            chargerFooter();

            // Initialisation de la carte, centrée sur la France
            const map = L.map('map').setView([46.603354, 1.888334], 6);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            // Récupération des données clients depuis le backend
            fetch('/predictIF/ActionServlet?todo=carte-clients')
                .then(response => response.json())
                .then(clients => {
                    const villes = {};

                    // Regroupement des clients par ville en lisant l'adresse postale
                    clients.forEach(c => {
                        if (c.lat && c.lng) {
                            // On cherche une séquence de 5 chiffres (Code Postal) suivie du nom de la ville
                            let match = c.adresse.match(/\d{5}\s+(.+)$/);
                            let ville = match ? match[1].trim().toUpperCase() : "VILLE INCONNUE";
                            
                            if (!villes[ville]) {
                                villes[ville] = { count: 0, lat: c.lat, lng: c.lng, noms: [] };
                            }
                            
                            villes[ville].count++;
                            villes[ville].noms.push(c.nom);
                        }
                    });

                    // Placement des marqueurs sur la carte Leaflet
                    for (const nomVille in villes) {
                        const data = villes[nomVille];
                        
                        const marker = L.marker([data.lat, data.lng]).addTo(map);
                        
                        // Construction du contenu HTML pour la modale
                        let popupContent = `
                            <div style="text-align: center;">
                                <h3 style="margin: 0 0 5px 0;">${nomVille}</h3>
                                <strong style="color: #2c3e50;">${data.count} client(s)</strong>
                            </div>
                            <hr style="margin: 8px 0;">
                            <ul style="margin: 0; padding-left: 20px; font-size: 0.9em;">
                                ${data.noms.map(nom => `<li>${nom}</li>`).join('')}
                            </ul>
                        `;
                        marker.bindPopup(popupContent);
                    }
                })
                .catch(error => console.error("Erreur lors de la récupération des données de la carte :", error));
        });
    </script>
</body>
</html>
