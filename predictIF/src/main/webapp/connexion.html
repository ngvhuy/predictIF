<!DOCTYPE html>
<html>
    <head>
        <title>Connexion</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <h1>Connexion</h1>

        <div id="erreur" style="color:red; display:none;">
            Identifiants incorrects. Veuillez réessayer.
        </div>

        <form id="formConnexion">
            <label>Email :</label><br>
            <input type="email" id="mail" name="mail" required><br><br>

            <label>Mot de passe :</label><br>
            <input type="password" id="password" name="password" required><br><br>

            <label>Profil :</label><br>
            <select id="profil" name="profil">
                <option value="client">Client</option>
                <option value="employe">Employé</option>
            </select><br><br>

            <button type="submit">Se connecter</button>
        </form>

        <script>
            document.getElementById("formConnexion").addEventListener("submit", function(e) {
                e.preventDefault();

                const mail = document.getElementById("mail").value;
                const password = document.getElementById("password").value;
                const profil = document.getElementById("profil").value;

                fetch("ActionServlet?todo=connexion&mail=" + encodeURIComponent(mail)
                        + "&password=" + encodeURIComponent(password)
                        + "&profil=" + encodeURIComponent(profil))
                    .then(response => response.json())
                    .then(data => {
                        if (data.succes) {
                            window.location.href = data.redirection;
                        } else {
                            document.getElementById("erreur").style.display = "block";
                        }
                    })
                    .catch(() => {
                        document.getElementById("erreur").style.display = "block";
                    });
            });
        </script>
    </body>
</html>
