<!DOCTYPE html>
<html>
    <head>
        <title>Inscription — Predict'IF</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <style>
            .page-content { max-width: 560px; }
        </style>
    </head>
    <body>
        <nav>
            <a class="nav-logo" href="index.html">Predict'IF</a>
            <ul id="nav-liens"></ul>
        </nav>

        <div class="page-content">
            <h1>Inscription</h1>
            <p class="sous-titre">Rejoignez Predict'IF et découvrez votre avenir !</p>

            <div class="erreur" id="erreur">
                Inscription échouée. Veuillez vérifier vos informations.
            </div>

            <div id="formInscription">
                <label>Nom</label>
                <input type="text" id="nom" name="nom" placeholder="Hugo" required>

                <label>Prénom</label>
                <input type="text" id="prenom" name="prenom" placeholder="Victor" required>

                <label>Email</label>
                <input type="email" id="email" name="email" placeholder="victor.hugo@insa-lyon.fr" required>

                <label>Date de naissance</label>
                <input type="date" id="dateDeNaissance" name="dateDeNaissance" required>

                <label>Adresse postale</label>
                <input type="text" id="adresse" name="adresse" placeholder="13 rue Albert Einstein 69100 Villeurbanne" required>

                <label>Numéro de téléphone</label>
                <input type="text" id="telephone" name="telephone" placeholder="+33 6 78 91 23 45" required>

                <label>Mot de passe</label>
                <input type="password" id="mdp" name="mdp" placeholder="password123" required>

                <label>Confirmation mot de passe</label>
                <input type="password" id="confirmationMdp" name="confirmationMdp" placeholder="password123" required>

                <button type="submit">Créer mon compte</button>
            </div>

            <div class="lien-bas">
                Déjà inscrit ? <a href="connexion.html">Connectez-vous</a>
            </div>
        </div>

        <script src="nav.js"></script>
        <script>
            window.onload = chargerNav;

            document.getElementById("formInscription").addEventListener("submit", function(e) {
                e.preventDefault();

                const nom = document.getElementById("nom").value;
                const prenom = document.getElementById("prenom").value;
                const mail = document.getElementById("email").value;
                const dateDeNaissance = document.getElementById("dateDeNaissance").value;
                const adresse = document.getElementById("adresse").value;
                const telephone = document.getElementById("telephone").value;
                const password = document.getElementById("mdp").value;
                const confirmation = document.getElementById("confirmationMdp").value;

                if (password !== confirmation) {
                    document.getElementById("erreur").style.display = "block";
                    return;
                }

                fetch("/predictIF/ActionServlet?todo=inscription&nom=" + encodeURIComponent(nom)
                        + "&prenom=" + encodeURIComponent(prenom)
                        + "&mail=" + encodeURIComponent(mail)
                        + "&dateDeNaissance=" + encodeURIComponent(dateDeNaissance)
                        + "&adresse=" + encodeURIComponent(adresse)
                        + "&telephone=" + encodeURIComponent(telephone)
                        + "&password=" + encodeURIComponent(password))
                    .then(response => response.json())
                    .then(data => {
                        if (data.succes) {
                            window.location.href = data.redirection;
                        } else {
                            document.getElementById("erreur").style.display = "block";
                        }
                    })
                    .catch(() => {
                        document.getElementById("erreur").style.display = "block";
                    });
            });
        </script>
    </body>
</html>
