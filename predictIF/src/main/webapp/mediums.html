<!DOCTYPE html>
<html>
    <head>
        <title>Nos médiums — Predict'IF</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <style>
            .medium-nom { font-size: 1.1rem; color: #c9a84c; margin-bottom: 4px; }
            .medium-genre { font-size: 0.85rem; color: #a89070; font-style: italic; margin-bottom: 8px; }
            .medium-presentation { font-size: 0.95rem; color: #e8d5b7; }
        </style>
    </head>
    <body>
        <nav>
            <a class="nav-logo" href="index.html">Predict'IF</a>
            <ul id="nav-liens"></ul>
        </nav>

        <div class="page-content">
            <h1>Nos Médiums</h1>
            <ul class="liste" id="liste-mediums">
                <li>Chargement...</li>
            </ul>
        </div>

        <script src="nav.js"></script>
        <script>
            async function listerMediums() {
                try {
                    const response = await fetch("/predictIF/ActionServlet?todo=consulter-liste-mediums");
                    const mediums = await response.json();
                    const ul = document.getElementById("liste-mediums");
                    ul.innerHTML = "";
                    mediums.forEach(function(m) {
                        const li = document.createElement("li");
                        li.innerHTML = '<div class="medium-nom">' + m.denomination + '</div>'
                                     + '<div class="medium-genre">' + m.genre + '</div>'
                                     + '<div class="medium-presentation">' + m.presentation + '</div>';
                        ul.appendChild(li);
                    });
                } catch (e) {
                    document.getElementById("liste-mediums").innerHTML = "<li>Impossible de charger les médiums.</li>";
                }
            }
            window.onload = function() { chargerNav(); listerMediums(); };
        </script>
    </body>
</html>
