<!DOCTYPE html>
<html>
    <head>
        <title>Connexion — Predict'IF</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <style>
            .page-content { max-width: 480px; margin: 80px auto; }
        </style>
    </head>
    <body>
        <nav>
            <a class="nav-logo" href="index.html">Predict'IF</a>
            <ul id="nav-liens"></ul>
        </nav>

        <div class="page-content">
            <h1>Connexion</h1>

            <div class="erreur" id="erreur">
                Identifiants incorrects. Veuillez réessayer.
            </div>

            <form id="formConnexion">
                <label>Email</label>
                <input type="email" id="mail" name="mail" placeholder="victor.hugo@insa-lyon.fr" required>

                <label>Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="password123" required>

                <div class="lien-bas">
                    Pas de compte ? <a href="inscription.html">S'inscrire</a>
                </div>

                <button type="submit">Se connecter</button>
            </form>
        </div>

        <script src="nav.js"></script>
        <script>
            window.onload = function() { chargerNav(); chargerFooter(); };

            document.getElementById("formConnexion").addEventListener("submit", function(e) {
                e.preventDefault();
                const mail = document.getElementById("mail").value;
                const password = document.getElementById("password").value;

                fetch("/predictIF/ActionServlet?todo=connexion&mail=" + encodeURIComponent(mail)
                        + "&password=" + encodeURIComponent(password))
                    .then(response => response.json())
                    .then(data => {
                        if (data.succes) {
                            window.location.href = data.redirection;
                        } else {
                            document.getElementById("erreur").style.display = "block";
                        }
                    })
                    .catch(() => {
                        document.getElementById("erreur").style.display = "block";
                    });
            });
        </script>
    </body>
</html>
