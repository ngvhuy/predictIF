<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte des Clients — Predict'IF</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        #map {
            height: 80vh;
            width: 70%;
            margin: 0 auto;
            display: block;
            border-radius: 8px;
            border: 1px solid #3a2a5e;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <nav>
        <a class="nav-logo" href="index.html">Predict'IF</a>
        <ul id="nav-liens"></ul>
    </nav>

    <div style="padding: 30px 20px 60px;">
        <h1 style="text-align:center; color:#c9a84c; letter-spacing:6px; text-transform:uppercase; margin-bottom:30px; font-family:Georgia,serif;">Carte des Clients</h1>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="nav.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            await chargerNav();
            chargerFooter();

            const map = L.map('map').setView([46.603354, 1.888334], 6);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            fetch('/predictIF/ActionServlet?todo=carte-clients')
                .then(response => response.json())
                .then(clients => {
                    const villes = {};

                    clients.forEach(c => {
                        if (c.lat && c.lng) {
                            let match = c.adresse.match(/\d{5}\s+(.+)$/);
                            let ville = match ? match[1].trim().toUpperCase() : "VILLE INCONNUE";

                            if (!villes[ville]) {
                                villes[ville] = { count: 0, lat: c.lat, lng: c.lng, noms: [] };
                            }
                            villes[ville].count++;
                            villes[ville].noms.push(c.nom);
                        }
                    });

                    for (const nomVille in villes) {
                        const data = villes[nomVille];
                        const marker = L.marker([data.lat, data.lng]).addTo(map);
                        marker.bindPopup(`
                            <div style="text-align:center;">
                                <h3 style="margin:0 0 5px 0;">${nomVille}</h3>
                                <strong style="color:#9b59b6;">${data.count} client(s)</strong>
                            </div>
                            <hr style="margin:8px 0;">
                            <ul style="margin:0;padding-left:20px;font-size:0.9em;">
                                ${data.noms.map(nom => `<li>${nom}</li>`).join('')}
                            </ul>
                        `);
                    }
                })
                .catch(error => console.error("Erreur carte :", error));
        });
    </script>
</body>
</html>
