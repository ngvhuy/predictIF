<!DOCTYPE html>
<html>
    <head>
        <title>Profil Astral — Predict'IF</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <style>
            .carte { background-color: #13102a; border: 1px solid #3a2a5e; border-radius: 6px; padding: 30px 24px; }
            .carte .champ { display: flex; justify-content: space-between; border-bottom: 1px solid #2a1a4e; padding: 8px 0; }
            .carte .champ:last-child { border-bottom: none; }
            .champ-label { color: #a89070; font-size: 0.85rem; letter-spacing: 1px; }
            .champ-valeur { color: #e8d5b7; font-size: 0.95rem; }
            .page-content { max-width: 600px; }
        </style>
    </head>
    <body>
        <nav>
            <a class="nav-logo" href="index.html">Predict'IF</a>
            <ul id="nav-liens"></ul>
        </nav>

        <div class="page-content">
            <h1>Profil Astral</h1>
            <div class="carte" id="profil-contenu">
                <div class="champ"><span class="champ-label">Chargement...</span></div>
            </div>
        </div>

        <script src="nav.js"></script>
        <script>
            window.onload = function() {
                chargerNav();
                document.getElementById("profil-contenu").innerHTML =
                    "<div class='champ'><span class='champ-label'>Profil astral</span><span class='champ-valeur'>À venir</span></div>";
            };
        </script>
    </body>
</html>
