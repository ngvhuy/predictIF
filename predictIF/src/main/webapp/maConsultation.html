<!DOCTYPE html>
<html>
    <head>
        <title>Ma Consultation — Predict'IF</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <style>
            .consultation-container {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
                margin: 20px 0;
            }
            
            .section {
                border: 2px solid #ccc;
                padding: 20px;
                border-radius: 8px;
                background-color: #f9f9f9;
            }
            
            .section h2 {
                margin-top: 0;
                color: #333;
                border-bottom: 2px solid #9b59b6;
                padding-bottom: 10px;
            }
            
            .info-row {
                display: flex;
                justify-content: space-between;
                padding: 8px 0;
                border-bottom: 1px solid #eee;
            }
            
            .info-label {
                font-weight: bold;
                color: #555;
            }
            
            .info-value {
                color: #333;
            }
            
            .historique-list {
                max-height: 300px;
                overflow-y: auto;
            }
            
            .historique-item {
                padding: 10px;
                margin: 5px 0;
                background-color: white;
                border-left: 4px solid #9b59b6;
                border-radius: 4px;
            }
            
            .outils-aide {
                display: flex;
                flex-direction: column;
                gap: 15px;
            }
            
            .niveau-control {
                display: flex;
                align-items: center;
                gap: 15px;
            }
            
            .niveau-label {
                font-weight: bold;
                min-width: 100px;
            }
            
            .niveau-buttons {
                display: flex;
                gap: 5px;
            }
            
            .niveau-btn {
                width: 40px;
                height: 40px;
                padding: 0;
                border: 2px solid #ddd;
                background-color: white;
                cursor: pointer;
                border-radius: 4px;
                font-weight: bold;
                transition: all 0.3s;
            }
            
            .niveau-btn:hover {
                border-color: #9b59b6;
                background-color: #f0e6f6;
            }
            
            .niveau-btn.active {
                background-color: #9b59b6;
                color: white;
                border-color: #9b59b6;
            }
            
            .btn-predire {
                background-color: #9b59b6;
                color: white;
                padding: 12px 20px;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                font-size: 16px;
                font-weight: bold;
                transition: background-color 0.3s;
            }
            
            .btn-predire:hover {
                background-color: #8e44ad;
            }
            
            .prediction-zone {
                min-height: 100px;
                padding: 15px;
                background-color: white;
                border-radius: 4px;
                border: 1px solid #ddd;
                word-wrap: break-word;
            }
            
            textarea {
                width: 100%;
                min-height: 120px;
                padding: 10px;
                border: 1px solid #ddd;
                border-radius: 4px;
                font-family: Arial, sans-serif;
                resize: vertical;
            }
            
            .actions {
                display: flex;
                gap: 15px;
                margin-top: 20px;
                justify-content: space-between;
            }
            
            .btn-action {
                padding: 12px 20px;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                font-size: 16px;
                font-weight: bold;
                transition: all 0.3s;
            }
            
            .btn-pret {
                background-color: #27ae60;
                color: white;
                flex: 1;
            }
            
            .btn-pret:hover {
                background-color: #229954;
            }
            
            .btn-terminer {
                background-color: #e74c3c;
                color: white;
                flex: 1;
            }
            
            .btn-terminer:hover {
                background-color: #c0392b;
            }
            
            .btn-action:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }
            
            .status-badge {
                display: inline-block;
                padding: 5px 10px;
                border-radius: 20px;
                font-weight: bold;
                font-size: 12px;
                margin-top: 10px;
            }
            
            .status-reservee {
                background-color: #f39c12;
                color: white;
            }
            
            .status-active {
                background-color: #27ae60;
                color: white;
            }
            
            .status-cloturee {
                background-color: #95a5a6;
                color: white;
            }
            
            .full-width {
                grid-column: 1 / -1;
            }
            
            .no-consultation {
                text-align: center;
                padding: 50px;
                color: #999;
            }
        </style>
    </head>
    <body>
        <nav>
            <a class="nav-logo" href="index.html">Predict'IF</a>
            <ul id="nav-liens"></ul>
        </nav>

        <div class="page-content">
            <h1>Ma Consultation</h1>
            <div id="consultation-content">
                <div class="no-consultation">Chargement de la consultation...</div>
            </div>
        </div>

        <script src="nav.js"></script>
        <script>
            let consultationData = null;
            let statut = null;

            window.onload = function() {
                chargerNav();
                chargerFooter();
                chargerConsultation();
            };

            function chargerConsultation() {
                fetch("/predictIF/ActionServlet?todo=charger-ma-consultation")
                    .then(r => r.json())
                    .then(data => {
                        consultationData = data;
                        statut = data.statut;
                        afficherConsultation(data);
                    })
                    .catch(err => {
                        console.error(err);
                        document.getElementById("consultation-content").innerHTML = 
                            '<div class="no-consultation">Erreur lors du chargement de la consultation</div>';
                    });
            }

            function afficherConsultation(data) {
                if (!data.id || data.id === 0) {
                    document.getElementById("consultation-content").innerHTML = 
                        '<div class="no-consultation">Aucune consultation en cours pour le moment.</div>';
                    return;
                }

                const isActive = data.statut === "ACTIVE";
                const isCloturee = data.statut === "CLOTUREE";

                let html = `
                    <div class="consultation-container">
                        <!-- Section Medium -->
                        <div class="section">
                            <h2>📿 Médium</h2>
                            <div class="info-row">
                                <span class="info-label">Dénomination:</span>
                                <span class="info-value">${data.mediumDenomination || '-'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Genre:</span>
                                <span class="info-value">${data.mediumGenre || '-'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Présentation:</span>
                                <span class="info-value">${data.mediumPresentation || '-'}</span>
                            </div>
                        </div>

                        <!-- Section Client -->
                        <div class="section">
                            <h2>👤 Client</h2>
                            <div class="info-row">
                                <span class="info-label">Nom:</span>
                                <span class="info-value">${data.clientNom || '-'} ${data.clientPrenom || ''}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Téléphone:</span>
                                <span class="info-value">${data.clientTelephone || '-'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Email:</span>
                                <span class="info-value">${data.clientMail || '-'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Naissance:</span>
                                <span class="info-value">${data.clientDateNaissance || '-'}</span>
                            </div>
                            <div class="status-badge status-${data.statut.toLowerCase()}">
                                ${data.statut}
                            </div>
                        </div>

                        <!-- Section Profil Astral -->
                        <div class="section">
                            <h2>✨ Profil Astral</h2>
                            <div class="info-row">
                                <span class="info-label">Zodiaque:</span>
                                <span class="info-value">${data.profilZodiac || '-'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Signe Chinois:</span>
                                <span class="info-value">${data.profilSigneChinois || '-'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Couleur:</span>
                                <span class="info-value">${data.profilCouleur || '-'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Animal:</span>
                                <span class="info-value">${data.profilAnimal || '-'}</span>
                            </div>
                        </div>

                        <!-- Section Historique -->
                        <div class="section">
                            <h2>📜 Historique</h2>
                            <div class="historique-list">
                                <div class="historique-item">
                                    <strong>Date:</strong> ${data.date || 'N/A'}<br>
                                    <strong>Début:</strong> ${data.heureDebut || 'Pas commencée'}<br>
                                    <strong>Fin:</strong> ${data.heureFin || 'En attente'}<br>
                                    <strong>Commentaires:</strong> ${data.commentaire || 'Aucun'}
                                </div>
                            </div>
                        </div>

                        <!-- Section Outils d'Aide -->
                        <div class="section full-width">
                            <h2>🔮 Outils d'Aide</h2>
                            <div class="outils-aide">
                                <div class="niveau-control">
                                    <span class="niveau-label">❤️ Amour:</span>
                                    <div class="niveau-buttons" id="niveaux-amour">
                                        <button class="niveau-btn" data-value="1" onclick="setNiveau('amour', 1)">1</button>
                                        <button class="niveau-btn" data-value="2" onclick="setNiveau('amour', 2)">2</button>
                                        <button class="niveau-btn" data-value="3" onclick="setNiveau('amour', 3)">3</button>
                                        <button class="niveau-btn" data-value="4" onclick="setNiveau('amour', 4)">4</button>
                                    </div>
                                </div>
                                <div class="niveau-control">
                                    <span class="niveau-label">💪 Santé:</span>
                                    <div class="niveau-buttons" id="niveaux-sante">
                                        <button class="niveau-btn" data-value="1" onclick="setNiveau('sante', 1)">1</button>
                                        <button class="niveau-btn" data-value="2" onclick="setNiveau('sante', 2)">2</button>
                                        <button class="niveau-btn" data-value="3" onclick="setNiveau('sante', 3)">3</button>
                                        <button class="niveau-btn" data-value="4" onclick="setNiveau('sante', 4)">4</button>
                                    </div>
                                </div>
                                <div class="niveau-control">
                                    <span class="niveau-label">💼 Travail:</span>
                                    <div class="niveau-buttons" id="niveaux-travail">
                                        <button class="niveau-btn" data-value="1" onclick="setNiveau('travail', 1)">1</button>
                                        <button class="niveau-btn" data-value="2" onclick="setNiveau('travail', 2)">2</button>
                                        <button class="niveau-btn" data-value="3" onclick="setNiveau('travail', 3)">3</button>
                                        <button class="niveau-btn" data-value="4" onclick="setNiveau('travail', 4)">4</button>
                                    </div>
                                </div>
                                <button class="btn-predire" onclick="genererPrediction()" ${isCloturee ? 'disabled' : ''}>🔮 Générer Prédiction</button>
                            </div>
                        </div>

                        <!-- Section Prédiction -->
                        <div class="section full-width">
                            <h2>🌟 Prédiction</h2>
                            <div class="prediction-zone" id="prediction-display">
                                ${data.prediction || 'Générez une prédiction en cliquant sur le bouton ci-dessus.'}
                            </div>
                        </div>

                        <!-- Section Commentaires -->
                        <div class="section full-width">
                            <h2>📝 Commentaires Finaux</h2>
                            <textarea id="commentaires" placeholder="Entrez les commentaires finaux de la consultation..." ${isCloturee ? 'readonly' : ''}>${data.commentaire || ''}</textarea>
                        </div>

                        <!-- Boutons d'Action -->
                        <div class="actions full-width">
                            <button class="btn-action btn-pret" onclick="demarrerConsultation()" ${isActive || isCloturee ? 'disabled' : ''}>
                                ✅ Je me sens prêt
                            </button>
                            <button class="btn-action btn-terminer" onclick="terminerConsultation()" ${!isActive || isCloturee ? 'disabled' : ''}>
                                ✋ Fin de Consultation
                            </button>
                        </div>
                    </div>
                `;

                document.getElementById("consultation-content").innerHTML = html;
                
                // Restaurer les niveaux sélectionnés
                if (data.niveauAmour) setNiveauUI('amour', data.niveauAmour);
                if (data.niveauSante) setNiveauUI('sante', data.niveauSante);
                if (data.niveauTravail) setNiveauUI('travail', data.niveauTravail);
            }

            function setNiveau(domaine, valeur) {
                const btn = document.querySelector(`#niveaux-${domaine === 'amour' ? 'amour' : domaine === 'sante' ? 'sante' : 'travail'} .niveau-btn[data-value="${valeur}"]`);
                if (btn) {
                    document.querySelectorAll(`#niveaux-${domaine === 'amour' ? 'amour' : domaine === 'sante' ? 'sante' : 'travail'} .niveau-btn`).forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    if (domaine === 'amour') consultationData.niveauAmour = valeur;
                    else if (domaine === 'sante') consultationData.niveauSante = valeur;
                    else if (domaine === 'travail') consultationData.niveauTravail = valeur;
                }
            }

            function setNiveauUI(domaine, valeur) {
                const container = document.getElementById(`niveaux-${domaine}`);
                if (container) {
                    container.querySelectorAll('.niveau-btn').forEach(btn => btn.classList.remove('active'));
                    const btn = container.querySelector(`[data-value="${valeur}"]`);
                    if (btn) btn.classList.add('active');
                }
            }

            function genererPrediction() {
                const amour = consultationData.niveauAmour || 1;
                const sante = consultationData.niveauSante || 1;
                const travail = consultationData.niveauTravail || 1;
                
                const predictions = [
                    `Les astres indiquent une évolution positive en matière d'amour (niveau ${amour}), de santé (niveau ${sante}) et de carrière (niveau ${travail}). Votre chemin est guidé par les énergies cosmiques.`,
                    `Une période de transformation vous attend. L'amour rayonne (${amour}/4), la santé s'améliore (${sante}/4) et les opportunités professionnelles émergent (${travail}/4).`,
                    `Les esprits révèlent: vos relations amoureuses évoluent, votre bien-être s'affirme et votre carrière prend un nouvel essor. Les énergies vous sont favorables.`
                ];
                
                const prediction = predictions[Math.floor(Math.random() * predictions.length)];
                document.getElementById('prediction-display').textContent = prediction;
                consultationData.prediction = prediction;
            }

            function demarrerConsultation() {
                fetch("/predictIF/ActionServlet?todo=demarrer-consultation", { method: 'POST' })
                    .then(() => {
                        alert('Consultation démarrée!');
                        chargerConsultation();
                    })
                    .catch(err => alert('Erreur: ' + err));
            }

            function terminerConsultation() {
                const commentaires = document.getElementById('commentaires').value;
                const params = new URLSearchParams({
                    todo: 'terminer-consultation',
                    commentaire: commentaires,
                    prediction: consultationData.prediction || '',
                    niveauAmour: consultationData.niveauAmour || 0,
                    niveauSante: consultationData.niveauSante || 0,
                    niveauTravail: consultationData.niveauTravail || 0
                });
                
                fetch("/predictIF/ActionServlet", { 
                    method: 'POST',
                    body: params,
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    }
                })
                    .then(() => {
                        alert('Consultation clôturée!');
                        chargerConsultation();
                    })
                    .catch(err => alert('Erreur: ' + err));
            }
        </script>
    </body>
</html>
